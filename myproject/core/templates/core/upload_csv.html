
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV File Upload</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        
        th {
            background-color: #f8f9fa;
            color: #343a40;
            text-align: center;
        }

        tr {
            background-color: #ffffff;
            color: #343a40;
            text-align: center;
        }

    </style>

    <script>
        window.addEventListener('beforeunload', function(event) {
            // Send AJAX request to Django to clear the session when the tab is closed
            fetch("{% url 'clear_session' %}", {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },
            }).then(response => {
                console.log('Session cleared.');
            }).catch(error => {
                console.log('Error clearing session:', error);
            });
        });
    </script>

</head>
<body>

   <div class="container mx-auto mt-5 px-4">
        {% if table_data %}
            <h3 class="text-center font-bold text-4xl mb-4">{{ file_name }}</h3>

            <!-- Scrollable wrapper -->
            <div class="overflow-auto max-w-full border rounded-md shadow">
                <!-- Table HTML from Pandas goes here -->
                <div class="min-w-full text-sm text-gray-800">
                    {{ table_data|safe }}
                </div>
            </div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <p class="alert alert-info mt-4 text-center">{{ message }}</p>
            {% endfor %}
        {% endif %}
    </div>

    <div class="container mx-auto mt-5 mb-10 px-4">
        <h3 class="text-center font-bold text-4xl mb-4">Choose the Graph</h3>

        <form method="POST" action="{% url 'generate_plot' %}"  class="max-w-md mx-auto p-4 border rounded shadow">
            {% csrf_token %}

            <!-- Graph Type Selection -->
            <label for="graphSelect" class="block mb-2 font-medium">Choose a graph type:</label>
            <select id="graphSelect" name="graph_type" class="border p-2 rounded w-full mb-4">
                <option value="bar">Bar</option>
                <option value="pie">Pie</option>
                <option value="line">Line</option>
            </select>

            <!-- X-Axis Input -->
            <label for="xAxis" class="block mb-2 font-medium">X-axis/Labels:</label>
            <input type="text" id="xAxis" name="x_axis" class="border p-2 rounded w-full mb-4" placeholder="Enter X-axis field">

            <!-- Y-Axis Input -->
            <label for="yAxis" class="block mb-2 font-medium">Y-axis/Values:</label>
            <input type="text" id="yAxis" name="y_axis" class="border p-2 rounded w-full mb-4" placeholder="Enter Y-axis field">

            <!-- Submit Button -->
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button>
        </form>
    </div>
    
    <div class="container mx-auto mt-5 mb-10 px-4 text-center">
        {% if plot_image %}
            <h3 class="block mb-4 font-semibold text-3xl">Generated Plot:</h3>
            <div class="flex justify-center">
                <img src="data:image/png;base64,{{ plot_image }}" alt="Generated Plot"
                    class="max-w-full h-auto border rounded shadow-md">
            </div>
        {% endif %}
</div>
</html>
