{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="icon" href="{% static 'core/media/fav2.png' %}" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-..." crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <nav>
        <a href="{% url 'home' %}" class="text-blue-600"><i class="fas fa-arrow-left" style="font-size: 50px; margin: 15px;"></i></a>
    </nav>

    <h1 style="text-align: center; font-size: 50px; margin: 50px 0;">Contact Us</h1>

    <div class="container">
        <form action="{% url 'contact' %}" method="POST" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4 max-w-sm text-center mx-auto">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="name">Name</label>
                <input type="text" name="name" id="name" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
                <input type="email" name="email" id="email" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="message">Message</label>
                <textarea name="message" id="message" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Send Message</button>
        </form>
    </div>

    <footer>
        <div class="bg-blue-600 text-white py-4 text-center">
            <p class="text-4xl" style="margin: 10px;">&copy; 2025 InsightGrid. All rights reserved.</p>

            <p class="text-3xl ">Follow us on: 
                <a href="{{Github}}" class="text-white-400"><i class="fab fa-github"></i> Github</a> | 
                <a href="{{Instagram}}" class="text-white-400"><i class="fab fa-instagram"></i> Instagram</a> | 
                <a href="{{Linkedin}}" class="text-white-400"><i class="fab fa-linkedin"></i> LinkedIn</a>
            </p>

            <p class="text-3xl text-gray-400 mx-2">
                <a href="{%url 'privacy' %}" class="hover:text-white">Privacy Policy</a> |
                <a href="{%url 'terms' %}" class="hover:text-white">Terms of Use</a>
            </p>
            
        </div>     
    </footer>
    
</html>
